name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bundles:
        description: 'Bundle types to build (comma-separated: deb,appimage,rpm,none)'
        required: false
        default: 'deb,appimage'
        type: string

jobs:
  build-linux:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: second-brain-linux-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Tauri bundle
        run: |
          cd src-tauri
          # Use the workflow_dispatch input if provided, else default to deb+appimage
          if [ -n "${{ inputs.bundles }}" ]; then
            BUNDLES="${{ inputs.bundles }}"
          else
            BUNDLES="deb,appimage"
          fi
          # Skip bundling entirely if 'none'
          if [ "$BUNDLES" = "none" ]; then
            cargo tauri build --no-bundle
          else
            cargo tauri build --bundles "$BUNDLES"
          fi

      - name: List built bundles
        if: always()
        run: |
          echo "--- bundles ---"
          find src-tauri/target/release/bundle -maxdepth 3 -type f 2>/dev/null
          echo "--- binary ---"
          ls -lh src-tauri/target/release/second-brain 2>/dev/null || true

      - name: Upload .deb
        if: hashFiles('src-tauri/target/release/bundle/deb/*.deb') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload .AppImage
        if: hashFiles('src-tauri/target/release/bundle/appimage/*.AppImage') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload .rpm
        if: hashFiles('src-tauri/target/release/bundle/rpm/*.rpm') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Upload raw binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-binary
          path: src-tauri/target/release/second-brain
          if-no-files-found: warn

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/second-brain
          fail_on_unmatched_files: false
          draft: true
          generate_release_notes: true
